name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    environment: langrepo

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      ENV: test
      DATABASE_USER: test
      DATABASE_PASSWORD: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: test_db
      DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
      AUTH0_ALGORITHMS: ${{ secrets.AUTH0_ALGORITHMS }}
      AWS_REGION: test
      BUCKET_NAME: test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.2"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Debug env vars
        run: |
          echo "AUTH0_DOMAIN=$AUTH0_ALGORITHMS"

      - name: Run tests
        working-directory: backend
        run: pytest

  build:
    runs-on: ubuntu-latest
    environment: langrepo
    needs: test

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: List repo files
        run: ls -R

      - name: Build and push image
        run: |
          docker buildx build --platform linux/amd64 -t langrepo:latest ./backend
          docker tag langrepo:latest 480442107509.dkr.ecr.us-east-1.amazonaws.com/langrepo:latest
          docker push 480442107509.dkr.ecr.us-east-1.amazonaws.com/langrepo:latest